<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IA SUPER INTELIGENTE - PROTOCOLO LUANDA</title>
    <link rel="manifest" href="./manifest.json">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght=700&family=Inter:wght=400;700;900&display=swap');
        body { background: #08080a; color: #ffffff; font-family: 'Inter', sans-serif; overflow-x: hidden; }
        .neon-card { background: rgba(13, 13, 17, 0.98); border: 1px solid rgba(219, 39, 119, 0.2); border-radius: 32px; }
        #radar-screen { width: 100%; height: 100px; background: #000; background-image: radial-gradient(circle, #1c1014 0%, #000 80%); border-radius: 12px; position: relative; overflow: hidden; }
        .pulse-status { animation: pulse 2s infinite; }
        @keyframes pulse { 0% { opacity: 0.5; } 50% { opacity: 1; } 100% { opacity: 0.5; } }
    </style>
</head>
<body class="flex flex-col items-center p-4 min-h-screen">
    <div class="w-full max-w-md space-y-4">
        <div class="flex justify-between items-center bg-zinc-900/90 p-5 rounded-2xl border border-zinc-800/60">
            <div>
                <p class="text-[10px] font-black uppercase"><span class="text-sky-300">ELEPHANTBET</span> <span class="text-zinc-500">/ LUANDA</span></p>
                <p id="clock" class="text-xl font-orbitron">00:00:00</p>
            </div>
            <div class="text-center">
                <span id="render-status-dot" class="w-2 h-2 rounded-full bg-red-500 inline-block pulse-status"></span>
                <p id="render-status-text" class="text-[8px] text-red-500 font-black uppercase">OFFLINE</p>
            </div>
            <div class="text-right">
                <p class="text-[10px] text-zinc-500 uppercase font-black">Banca</p>
                <p id="banca" class="text-sm font-bold text-green-500">Kz 0,00</p>
            </div>
        </div>

        <div class="neon-card p-5 text-center">
            <div id="radar-screen" class="mb-4 flex items-center justify-center">
                <div id="radar-multiplier" class="text-3xl font-orbitron font-black text-zinc-800">1.00x</div>
            </div>
            <div class="h-1 bg-zinc-800 rounded-full mb-4 overflow-hidden"><div id="loading-bar" class="h-full bg-pink-600 w-0 transition-all"></div></div>
            <div id="status" class="text-[10px] font-black uppercase text-zinc-500">Sistema em Espera</div>
            <div id="timer" class="text-4xl font-orbitron mb-4 text-white">--:--</div>
            <button onclick="document.getElementById('file').click()" class="w-full bg-zinc-800 text-zinc-300 py-3 rounded-xl mb-2 text-[10px] uppercase font-bold">1. Selecionar Gráfico</button>
            <button onclick="analisar()" class="w-full bg-pink-600 text-white py-4 rounded-xl font-black text-lg">2. Analisar</button>
            <input type="file" id="file" class="hidden" accept="image/*">
        </div>
    </div>
    <script>
        const API_URL = 'https://preditor-elite-backend-render-2026.onrender.com';
        async function analisar() {
            const file = document.getElementById('file').files[0];
            if (!file) return alert("Selecione um print.");
            const formData = new FormData(); formData.append('print', file);
            try {
                const res = await fetch(`${API_URL}/analisar-fluxo`, { method: 'POST', body: formData });
                const data = await res.json();
                document.getElementById('timer').innerText = data.timerRosa;
                document.getElementById('pct').innerText = data.pct;
                document.getElementById('banca').innerText = data.banca;
                document.getElementById('alvo').innerText = data.alvo;
                document.getElementById('status').innerText = data.status;
                document.getElementById('status').style.color = data.cor;
                document.getElementById('render-status-dot').className = "w-2 h-2 rounded-full bg-green-500 inline-block";
                document.getElementById('render-status-text').innerText = "ONLINE";
            } catch(e) { alert("Erro de conexão"); }
        }
        if ('serviceWorker' in navigator) { window.addEventListener('load', () => navigator.serviceWorker.register('./sw.js')); }
    </script>
</body>
</html>
