<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IA SUPER INTELIGENTE - PROTOCOLO LUANDA</title>
    <link rel="manifest" href="./manifest.json">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght=700&family=Inter:wght=400;700;900&display=swap');
        
        body { 
            background: #08080a; 
            color: #ffffff; 
            font-family: 'Inter', sans-serif; 
            overflow-x: hidden;
        }

        .font-orbitron { font-family: 'Orbitron', sans-serif; }

        .neon-card { 
            background: rgba(13, 13, 17, 0.98);
            border: 1px solid rgba(219, 39, 119, 0.2);
            box-shadow: 0 0 25px rgba(0, 0, 0, 0.5);
            border-radius: 32px;
        }

        .chip { 
            font-size: 11px; 
            padding: 4px 10px; 
            border-radius: 6px; 
            font-weight: 900; 
            text-shadow: 0 1px 2px rgba(0,0,0,0.5);
        }

        .progress-bar {
            height: 4px;
            background: #18181b;
            border-radius: 2px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: #db2777;
            width: 0%;
            transition: width 0.5s ease;
        }

        .pulse-status {
            animation: pulse 2s infinite;
        }
        @keyframes pulse {
            0% { transform: scale(0.95); opacity: 0.5; }
            50% { transform: scale(1.05); opacity: 1; }
            100% { transform: scale(0.95); opacity: 0.5; }
        }

        /* Ecrã de Voo Autêntico do Aviator Real - Pequeno e sem bordas externas */
        #radar-screen {
            position: relative;
            width: 100%;
            height: 125px;
            background: #000000;
            background-image: radial-gradient(circle at 50% 50%, #1c1014 0%, #000000 80%);
            border-radius: 16px;
            overflow: hidden;
        }
        #rocket {
            position: absolute;
            left: 20px;
            bottom: 20px;
            font-size: 28px;
            transform: rotate(45deg);
            transition: transform 0.08s ease;
            display: none;
            z-index: 10;
        }
        .grid-line {
            position: absolute;
            background: rgba(219, 39, 119, 0.03);
        }
    </style>
</head>
<body class="flex flex-col items-center p-4 min-h-screen">

    <div class="w-full max-w-md space-y-4">
        
        <!-- Bloco Superior de Estado -->
        <div class="flex justify-between items-center bg-zinc-900/90 p-5 rounded-2xl border border-zinc-800/60 backdrop-blur-md relative">
            <div>
                <p class="text-[10px] font-black tracking-widest uppercase"><span class="text-sky-300">ELEPHANTBET</span> <span class="text-zinc-400">/ LUANDA</span></p>
                <p id="clock" class="text-xl font-orbitron text-zinc-100">00:00:00</p>
            </div>

            <div class="flex flex-col items-center justify-center absolute left-1/2 -translate-x-1/2 text-center">
                <span id="render-status-dot" class="w-3 h-3 rounded-full bg-red-500 shadow-[0_0_10px_#ef4444] pulse-status mb-1"></span>
                <span id="render-status-text" class="text-[8px] font-black uppercase tracking-wider text-red-500">OFFLINE</span>
            </div>

            <div class="text-right">
                <p class="text-[10px] text-zinc-500 font-bold uppercase tracking-widest">Banca Detetada</p>
                <p id="banca" class="text-xl font-bold text-green-500">Kz 0,00</p>
            </div>
        </div>

        <!-- Painel de Operação Central -->
        <div class="neon-card p-5 text-center relative overflow-hidden">
            
            <!-- MONITOR RADAR ESTILO AVIATOR REAL (PEQUENO) -->
            <div id="radar-screen" class="mb-4 flex items-center justify-center">
                <div class="grid-line w-full h-[1px] top-1/3 left-0"></div>
                <div class="grid-line w-full h-[1px] top-2/3 left-0"></div>
                <div class="grid-line h-full w-[1px] left-1/3 top-0"></div>
                <div class="grid-line h-full w-[1px] left-2/3 top-0"></div>
                
                <div id="rocket">🚀</div>
                
                <div id="radar-multiplier" class="text-4xl font-orbitron font-black text-zinc-800 select-none">1.00x</div>
            </div>

            <div class="progress-bar mb-5">
                <div id="loading-bar" class="progress-fill"></div>
            </div>

            <div id="status" class="text-[11px] font-black uppercase tracking-[0.2em] text-zinc-500 mb-2">IA Sistema em Espera</div>
            <div id="timer" class="text-5xl font-orbitron mb-5 tracking-tighter text-white">--:--</div>

            <div class="grid grid-cols-2 gap-4 mb-5 py-4 border-y border-zinc-800/60">
                <div class="text-left">
                    <p class="text-[9px] text-zinc-500 uppercase font-black mb-1">Assertividade</p>
                    <p id="pct" class="text-2xl font-black text-pink-500">0%</p>
                </div>
                <div class="text-right">
                    <p class="text-[9px] text-zinc-500 uppercase font-black mb-1">Alvo Previsto</p>
                    <p id="alvo" class="text-xl font-black text-white italic">---</p>
                </div>
            </div>

            <div class="mb-5 min-h-[40px]">
                <p id="dica" class="text-xs text-zinc-400 font-medium leading-relaxed italic">
                    "Aguardando carregamento do print para análise de ciclos SHA-512."
                </p>
            </div>

            <input type="file" id="file" class="hidden" accept="image/*">
            <button onclick="document.getElementById('file').click()" class="w-full bg-zinc-800/60 hover:bg-zinc-800 text-zinc-300 font-bold py-4 rounded-xl mb-3 text-[11px] uppercase tracking-widest border border-zinc-700/40 transition-all">
                1. Selecionar Gráfico
            </button>
            
            <button onclick="analisar()" class="w-full bg-pink-600 hover:bg-pink-500 text-white font-black py-5 rounded-xl text-xl shadow-xl shadow-pink-900/30 active:scale-95 transition-all">
                2. Analisar com Super IA
            </button>
        </div>

        <!-- Histórico Lido -->
        <div class="bg-zinc-900/40 p-5 rounded-2xl border border-zinc-800/40">
            <p class="text-[9px] text-zinc-500 font-black mb-4 uppercase tracking-[0.1em]">Última Sequência Lida</p>
            <div id="hist" class="flex flex-wrap gap-2 justify-center"></div>
        </div>
    </div>

    <script>
        const API_URL = 'https://preditor-elite-backend-render-2026.onrender.com';

        setInterval(() => {
            const options = { timeZone: 'Africa/Luanda', hour: '2-digit', minute: '2-digit', second: '2-digit', hour12: false };
            document.getElementById('clock').innerText = new Intl.DateTimeFormat('pt-PT', options).format(new Date());
        }, 1000);

        async function acordarRender() {
            const dot = document.getElementById('render-status-dot');
            const text = document.getElementById('render-status-text');
            text.innerText = "ACORDANDO...";
            text.className = "text-[8px] font-black uppercase tracking-wider text-yellow-500";
            dot.className = "w-3 h-3 rounded-full bg-yellow-500 shadow-[0_0_10px_#eab308] pulse-status mb-1";
            try {
                const response = await fetch(`${API_URL}/health`);
                if (response.ok) {
                    dot.className = "w-3 h-3 rounded-full bg-green-500 shadow-[0_0_10px_#22c55e] mb-1";
                    text.innerText = "ONLINE";
                    text.className = "text-[8px] font-black uppercase tracking-wider text-green-500";
                }
            } catch (error) {
                console.error("Servidor offline:", error);
                dot.className = "w-3 h-3 rounded-full bg-red-500 shadow-[0_0_10px_#ef4444] pulse-status mb-1";
                text.innerText = "DORMINDO";
                text.className = "text-[8px] font-black uppercase tracking-wider text-red-500";
            }
        }

        window.addEventListener('DOMContentLoaded', acordarRender);

        function executarFluxoVoo(alvoMaximo) {
            const rocket = document.getElementById('rocket');
            const display = document.getElementById('radar-multiplier');
            
            if (alvoMaximo <= 0) {
                display.innerText = "ESPERAR";
                display.className = "text-2xl font-orbitron font-black text-red-500";
                rocket.style.display = "none";
                return;
            }

            display.innerText = "READY";
            display.className = "text-2xl font-orbitron font-black text-yellow-500";
            rocket.style.display = "block";
            rocket.style.left = "15px";
            rocket.style.bottom = "15px";
            rocket.style.transform = "rotate(45deg) scale(1)";

            setTimeout(() => {
                display.className = "text-4xl font-orbitron font-black text-red-500";
                let currentMult = 1.00;
                const startTime = Date.now();
                
                const flightInterval = setInterval(() => {
                    const elapsed = (Date.now() - startTime) / 1000;
                    currentMult = 1.00 + Math.pow(elapsed * 0.98, 1.25);
                    
                    if (currentMult >= alvoMaximo) {
                        clearInterval(flightInterval);
                        display.innerText = "💥 FLEW AWAY";
                        display.className = "text-3xl font-orbitron font-black text-zinc-400";
                        rocket.style.transform = "scale(1.5) rotate(45deg)";
                        setTimeout(() => { rocket.style.display = "none"; }, 500);
                    } else {
                        display.innerText = currentMult.toFixed(2) + "x";
                        
                        let progress = (currentMult - 1) / (alvoMaximo - 1 || 1);
                        let posX = 15 + (progress * 75); 
                        let posY = 15 + (Math.sin(progress * Math.PI / 2) * 70);
                        rocket.style.left = `${Math.min(posX, 88)}%`;
                        rocket.style.bottom = `${Math.min(posY, 80)}%`;
                    }
                }, 45);
            }, 2000);
        }

        async function analisar() {
            const fileInput = document.getElementById('file');
            const file = fileInput.files[0];
            if (!file) {
                alert("Por favor, selecione uma imagem do histórico primeiro.");
                return;
            }

            document.getElementById('status').innerText = "Processando Padrões...";
            document.getElementById('loading-bar').style.width = "40%";
            const formData = new FormData();
            formData.append('print', file);

            try {
                const response = await fetch(`${API_URL}/analisar-fluxo`, { method: 'POST', body: formData });
                if (!response.ok) throw new Error("Erro no servidor");
                const data = await response.json();

                document.getElementById('loading-bar').style.width = "100%";
                const timeParts = data.timerRosa.split(':');
                document.getElementById('timer').innerText = `${timeParts[0]}:${timeParts[1]}`;
                
                document.getElementById('pct').innerText = data.pct;
                document.getElementById('banca').innerText = data.banca;
                document.getElementById('alvo').innerText = data.alvo;
                document.getElementById('status').innerText = data.status.toUpperCase();
                document.getElementById('status').style.color = data.cor;
                document.getElementById('dica').innerText = data.dica;

                const histDiv = document.getElementById('hist');
                histDiv.innerHTML = '';
                data.historico.forEach(v => {
                    const chip = document.createElement('div');
                    let colorClass = v < 2 ? 'bg-blue-600' : (v < 10 ? 'bg-purple-600' : 'bg-pink-600');
                    chip.className = `chip ${colorClass}`;
                    chip.innerText = v.toFixed(2) + 'x';
                    histDiv.appendChild(chip);
                });

                document.getElementById('render-status-dot').className = "w-3 h-3 rounded-full bg-green-500 shadow-[0_0_10px_#22c55e] mb-1";
                document.getElementById('render-status-text').innerText = "ONLINE";

                executarFluxoVoo(data.alvoNumerico);

                setTimeout(() => { document.getElementById('loading-bar').style.width = "0%"; }, 2000);
            } catch (error) {
                console.error(error);
                alert("Erro ao conectar à IA.");
                document.getElementById('status').innerText = "ERRO DE CONEXÃO";
                document.getElementById('loading-bar').style.width = "0%";
                document.getElementById('render-status-dot').className = "w-3 h-3 rounded-full bg-red-500 shadow-[0_0_10px_#ef4444] pulse-status mb-1";
                document.getElementById('render-status-text').innerText = "DORMINDO";
            }
        }

        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./sw.js')
                    .then(reg => console.log('Service Worker Registado com sucesso!', reg.scope))
                    .catch(err => console.log('Falha ao registar o Service Worker:', err));
            });
        }
    </script>
</body>
</html>
